<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>WordBlock</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>/* ===== RESET & BASE ===== */*, *::before, *::after {  box-sizing: border-box;  margin: 0;  padding: 0;}html {  -webkit-font-smoothing: antialiased;  -moz-osx-font-smoothing: grayscale;  text-rendering: optimizeLegibility;  -webkit-text-size-adjust: 100%;  -webkit-tap-highlight-color: transparent;}body {  background: #FFFFFF;  font-family: 'Inter', 'Noto Sans SC', sans-serif;  color: #1C1C1E;}.app {  max-width: 428px;  margin: 0 auto;  background: #FFFFFF;}.page { display: none; }.page.active { display: block; }.tab-bar { position: fixed; bottom: 0; width: 100%; max-width: 428px; display: flex; background: #FAFAFA; border-top: 1px solid #E8E8E8; z-index: 100; }.tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 8px 0 6px; cursor: pointer; color: #999; }.tab-item.active { color: #007AFF; }</style>
</head>
<body>
<div class="app"><div id="page-search" class="page active"><p>PLACEHOLDER - FULL VERSION PENDING</p></div></div>
<nav class="tab-bar"><div class="tab-item active" data-tab="search"><span>🔍</span><span>查词</span></div></nav>
</body>
</html>
