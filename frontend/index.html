<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>WordBlock</title>
<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#007AFF">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="WordBlock">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<!-- Styles -->
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/wordbook.css">
<link rel="stylesheet" href="css/study-settings.css">
<style>
/* ===== AUTH PAGE ===== */
.auth-page {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: #FFFFFF;
  z-index: 10000;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.auth-page.open {
  display: flex;
}
.auth-content {
  width: 100%;
  max-width: 360px;
}
.auth-logo {
  font-size: 56px;
  text-align: center;
  margin-bottom: 8px;
}
.auth-app-name {
  font-size: 28px;
  font-weight: 700;
  text-align: center;
  color: #1A1A1A;
  margin-bottom: 4px;
}
.auth-subtitle {
  font-size: 15px;
  color: #888;
  text-align: center;
  margin-bottom: 32px;
}
.auth-field {
  margin-bottom: 16px;
}
.auth-label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: #555;
  margin-bottom: 6px;
}
.auth-input {
  width: 100%;
  padding: 12px 14px;
  border: 1.5px solid #E0E0E0;
  border-radius: 12px;
  font-size: 16px;
  font-family: inherit;
  background: #FAFAFA;
  color: #1A1A1A;
  outline: none;
  transition: border-color 0.2s;
  box-sizing: border-box;
}
.auth-input:focus {
  border-color: #007AFF;
  background: #FFF;
}
.auth-error {
  color: #FF3B30;
  font-size: 13px;
  min-height: 20px;
  margin-bottom: 8px;
  text-align: center;
}
.auth-btn {
  width: 100%;
  padding: 14px;
  background: #007AFF;
  color: #FFF;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: opacity 0.2s;
}
.auth-btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}
.auth-btn:active:not(:disabled) {
  opacity: 0.8;
}
.auth-switch {
  text-align: center;
  margin-top: 20px;
  font-size: 14px;
  color: #888;
}
.auth-switch a {
  color: #007AFF;
  text-decoration: none;
  font-weight: 500;
}
</style>
</head>
<body>

<!-- Auth Page -->
<div class="auth-page" id="authPage">
  <div class="auth-content" id="authContent"></div>
</div>

<div class="app" id="appMain">
  <div class="status-bar"></div>

  <!-- ====== PAGE 1: SEARCH ====== -->
  <div id="page-search" class="page active">
    <div class="header">
      <div class="page-title">查词</div>
      <div class="page-subtitle">搜索单词，收录到你的词库</div>
    </div>

    <div class="search-container">
      <div class="search-bar">
        <span class="search-icon">🔍</span>
        <input
          type="text"
          id="searchInput"
          placeholder="输入英文单词..."
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
          spellcheck="false"
          enterkeyhint="search"
        >
      </div>
    </div>

    <!-- Homepage modules: Progress + Quick Review -->
    <div class="home-modules" id="homeModules"></div>

    <!-- Recent words -->
    <div class="recent-section" id="recentSection"></div>

    <!-- Explore words -->
    <div class="explore-section" id="exploreSection"></div>

    <!-- Tips -->
    <div class="tips-section" id="tipsSection"></div>

    <!-- Results area -->
    <div class="results-area" id="resultsArea"></div>

    <!-- Hidden file input for photo in result card -->
    <input type="file" id="resultImageInput" accept="image/*" capture="environment" hidden>
  </div>

  <!-- ====== PAGE 2: WORDBOOK ====== -->
  <div id="page-wordbook" class="page">
    <div class="wb-header">
      <div class="wb-header-left">
        <div class="page-title">生词本</div>
        <div class="page-subtitle">我收录的所有单词</div>
      </div>
      <div class="wb-count-badge" id="wbCountBadge">0 个单词</div>
    </div>
    <div class="wb-toolbar">
      <div class="wb-filter-container">
        <div class="wb-filter-bar">
          <span class="wb-filter-icon">🔍</span>
          <input
            type="text"
            id="wbFilterInput"
            placeholder="搜索单词..."
            autocomplete="off"
            autocorrect="off"
            autocapitalize="off"
            spellcheck="false"
          >
        </div>
      </div>
      <button class="wb-sort-btn" id="wbSortBtn" onclick="cycleWbSort()">⇅ 查询次数</button>
    </div>
    <div class="wb-word-list" id="wbWordList"></div>
  </div>

  <!-- ====== PAGE 3: STUDY ====== -->
  <div id="page-study" class="page">
    <div class="study-header">
      <div class="page-title">学习</div>
      <div class="page-subtitle">基于词块的智能复习</div>
    </div>
    <div class="stats-row" id="studyStats"></div>
    <div class="block-list" id="blockList"></div>
  </div>

  <!-- ====== PAGE 4: SETTINGS ====== -->
  <div id="page-settings" class="page">
    <div class="settings-header">
      <div class="page-title">设置</div>
      <div class="page-subtitle">个性化你的学习体验</div>
    </div>
    <div class="settings-sections" id="settingsSections"></div>
  </div>
</div>

<!-- Tab bar — WeChat style -->
<nav class="tab-bar" aria-label="主导航">
  <div class="tab-item active" data-tab="search" role="tab" aria-selected="true">
    <span class="tab-icon">🔍</span>
    <span class="tab-label">查词</span>
  </div>
  <div class="tab-item" data-tab="wordbook" role="tab" aria-selected="false">
    <span class="tab-icon">📒</span>
    <span class="tab-label">生词本</span>
  </div>
  <div class="tab-item" data-tab="study" role="tab" aria-selected="false">
    <span class="tab-icon">📖</span>
    <span class="tab-label">学习</span>
  </div>
  <div class="tab-item" data-tab="settings" role="tab" aria-selected="false">
    <span class="tab-icon">⚙️</span>
    <span class="tab-label">设置</span>
  </div>
</nav>

<!-- Sheet overlay -->
<div class="sheet-overlay" id="sheetOverlay"></div>

<!-- Collection sheet -->
<div class="sheet" id="collectionSheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">收录到词块</div>
  <div class="sheet-word" id="sheetWord"></div>
  <div class="sheet-selected-defs" id="sheetSelectedDefs"></div>
  <div class="sheet-label">自定义笔记</div>
  <textarea class="sheet-textarea" id="sheetNote" rows="3" placeholder="添加你自己的释义或笔记..."></textarea>
  <div class="sheet-label">场景图片</div>
  <div class="image-upload-area" id="imageUpload">
    <span class="upload-icon">📷</span>
    <span>点击上传图片</span>
  </div>
  <input type="file" id="imageFileInput" accept="image/*" hidden>
  <button class="btn-confirm" id="btnConfirm">确认收录</button>
</div>

<!-- Word detail full page -->
<div class="word-detail-page" id="wordDetailPage">
  <div class="wd-nav">
    <button class="wd-back-btn" onclick="closeWordDetail()">❮ 返回</button>
    <div class="wd-nav-title">单词详情</div>
  </div>
  <div class="wd-body" id="wordDetailBody"></div>
</div>
<input type="file" id="wdPhotoInput" accept="image/*" capture="environment" hidden>

<!-- Lightbox -->
<div class="wd-lightbox" id="wdLightbox">
  <button class="wd-lightbox-close" onclick="closeLightbox()">✕</button>
  <img class="wd-lightbox-img" id="lbImg" src="" alt="">
  <div class="wd-lightbox-nav">
    <button class="wd-lightbox-arrow" id="lbPrev" onclick="lightboxNav(-1)">‹</button>
    <span class="wd-lightbox-counter" id="lbCounter">1 / 1</span>
    <button class="wd-lightbox-arrow" id="lbNext" onclick="lightboxNav(1)">›</button>
  </div>
</div>

<!-- Definition Sheet -->
<div class="def-sheet-overlay" id="defSheetOverlay" onclick="closeDefSheet()"></div>
<div class="def-sheet" id="defSheet">
  <div class="def-sheet-handle"></div>
  <div class="def-sheet-header">
    <div class="def-sheet-title" id="dsTitle">添加释义</div>
    <div class="def-sheet-phonetic" id="dsPhonetic"></div>
  </div>
  <div class="def-sheet-section">已收录的释义</div>
  <div class="def-sheet-list" id="dsDictList"></div>
  <div class="def-sheet-divider"></div>
  <div class="def-sheet-section">自定义释义 <span class="def-sheet-section-sub">（用户自己添加）</span></div>
  <div class="def-sheet-custom-row">
    <input class="pos-input" id="dsCustomPos" placeholder="n." value="n.">
    <input id="dsCustomDef" placeholder="输入自定义释义...">
    <button class="ds-add-btn" onclick="addSheetCustomDef()">添加</button>
  </div>
  <div id="dsMyCustomList"></div>
  <button class="def-sheet-confirm" onclick="confirmDefSheet()">确认</button>
</div>

<!-- Block browse page -->
<div class="block-browse-page" id="blockBrowsePage">
  <div class="bb-nav">
    <button class="bb-back-btn" onclick="closeBlockBrowse()">❮ 返回</button>
    <div class="bb-nav-title" id="bbNavTitle">Block #1</div>
  </div>
  <div class="bb-list" id="bbWordList"></div>
</div>

<!-- Language selector sheet -->
<div class="sheet" id="langSheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title" id="langSheetTitle">选择语言</div>
  <div class="lang-options-list" id="langOptionsList"></div>
</div>

<!-- Review overlay -->
<div class="review-overlay" id="reviewOverlay">
  <div class="review-top-bar">
    <button class="btn-review-close" id="btnReviewClose">✕</button>
    <div class="review-progress-text" id="reviewProgressText">1/5</div>
    <div style="width:44px"></div>
  </div>
  <div class="review-progress-bar-track">
    <div class="review-progress-bar-fill" id="reviewProgressFill" style="width:20%"></div>
  </div>
  <div class="review-body" id="reviewBody"></div>
  <div class="review-actions" id="reviewActions">
    <button class="btn-dont-know" id="btnDontKnow">不认识</button>
    <button class="btn-know" id="btnKnow">认识</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="js/api.js"></script>
<script src="js/data.js"></script>
<script src="js/ui-search.js"></script>
<script src="js/ui-wordbook.js"></script>
<script src="js/ui-study-settings.js"></script>
<script>
// Register Service Worker for PWA
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('SW registered:', reg.scope))
      .catch(err => console.log('SW registration failed:', err));
  });
}

// Initialize App
initApp();
</script>

</body>
</html>
