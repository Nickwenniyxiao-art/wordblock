name: Combine Parts into index.html

on:
  push:
    paths:
      - 'frontend/parts/part1.txt'
      - 'frontend/parts/part2.txt'
      - 'frontend/parts/part3.b64'

jobs:
  combine:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Decode part3 from base64
        run: |
          base64 -d frontend/parts/part3.b64 > /tmp/part3_decoded.txt
          echo "Part3 decoded, lines: $(wc -l < /tmp/part3_decoded.txt)"

      - name: Combine parts into index.html
        run: |
          cat frontend/parts/part1.txt frontend/parts/part2.txt /tmp/part3_decoded.txt > frontend/index.html
          echo "Combined file size: $(wc -c < frontend/index.html) bytes"
          echo "Combined lines: $(wc -l < frontend/index.html)"
          head -1 frontend/index.html
          tail -1 frontend/index.html

      - name: Remove parts directory
        run: |
          git rm -r --cached frontend/parts/ || true
          rm -rf frontend/parts/

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/index.html
          git status
          git diff --cached --stat
          git commit -m "fix: restore original full source code (4177 lines, 118KB) via Actions"
          git push
