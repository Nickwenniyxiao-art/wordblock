name: Combine Parts into index.html

on:
  push:
    paths:
      - 'frontend/parts/part1.txt'
      - 'frontend/parts/part2.txt'
      - 'frontend/parts/part3_b64_1.txt'
      - 'frontend/parts/part3_b64_2.txt'

jobs:
  combine:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Decode part3 from split base64
        run: |
          cat frontend/parts/part3_b64_1.txt frontend/parts/part3_b64_2.txt | base64 -d > /tmp/part3_decoded.txt
          echo "Part3 decoded lines: $(wc -l < /tmp/part3_decoded.txt)"
          echo "Part3 decoded size: $(wc -c < /tmp/part3_decoded.txt) bytes"

      - name: Combine all parts into index.html
        run: |
          cat frontend/parts/part1.txt frontend/parts/part2.txt /tmp/part3_decoded.txt > frontend/index.html
          echo "index.html size: $(wc -c < frontend/index.html) bytes"
          echo "index.html lines: $(wc -l < frontend/index.html)"
          echo "First line: $(head -1 frontend/index.html)"
          echo "Last line: $(tail -1 frontend/index.html)"

      - name: Remove parts directory
        run: |
          git rm -r --cached frontend/parts/ || true
          rm -rf frontend/parts/

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/index.html
          git status
          git diff --cached --stat
          git commit -m "fix: restore original full source code (4177 lines, 118KB) via Actions"
          git push
